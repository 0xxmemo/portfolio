<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background glass effect -->
  <rect width="100" height="100" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- CN letters in shadcn style -->
  <text x="50" y="62" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle" fill="url(#liquidGrad)">cn</text>
  <!-- Liquid drop accent -->
  <circle cx="75" cy="25" r="6" fill="url(#liquidGrad)" opacity="0.8"/>
  <circle cx="75" cy="25" r="4" fill="white" opacity="0.3"/>
</svg>
